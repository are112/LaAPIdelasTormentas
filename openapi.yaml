openapi: 3.0.3
info:
  title: La API de las Tormentas
  description: |
    API REST sobre el universo literario **El Archivo de las Tormentas** de Brandon Sanderson.

    Cubre personajes, heraldos, spren, Deshechos y Esquirlas con búsqueda avanzada,
    filtros combinables, paginación, selección de campos y explorador visual interactivo.

    ---

    ## Cómo empezar

    No necesitas registrarte ni obtener ninguna clave. La API es pública y gratuita.

    ### Tu primera llamada

    ```
    GET /personajes/kaladin
    ```

    ### Desde tu código

    **JavaScript / fetch**
    ```javascript
    const res = await fetch("https://laapidelastormentas.onrender.com/personajes/kaladin");
    const kaladin = await res.json();
    console.log(kaladin.nombre); // "Kaladin"
    ```

    **Python**
    ```python
    import requests
    r = requests.get("https://laapidelastormentas.onrender.com/personajes/kaladin")
    print(r.json()["nombre"])  # "Kaladin"
    ```

    **curl**
    ```bash
    curl https://laapidelastormentas.onrender.com/personajes/kaladin
    ```

    ---

    ## Búsqueda y filtros

    El endpoint `/buscar` permite combinar filtros libremente sobre todas las entidades:

    ```
    GET /buscar?orden=Corredores del Viento&nivel_ideal=>=3
    GET /buscar?tipo=deshecho&estado_actual=aprisionado
    GET /buscar?texto=Shadesmar&sort=-nivel_ideal&limit=5
    GET /buscar?orden_radiantes.spren_asociado.principal=Sylphrena
    ```

    ---

    ## Formato de respuesta

    Todas las respuestas son JSON con codificación UTF-8.
    Los errores siguen siempre la misma estructura:

    ```json
    { "error": "Personaje no encontrado" }
    ```

    ---

    ## Límites de uso

    La API aplica un límite de **100 peticiones por IP cada 15 minutos**.
    Si lo superas recibirás un error `429`.

  version: "2.0.0"
  contact:
    name: La API de las Tormentas
    url: https://laapidelastormentas.onrender.com

servers:
  - url: https://laapidelastormentas.onrender.com
    description: Producción (Render)

tags:
  - name: Sistema
    description: Estado y monitorización del servidor
  - name: Personajes
    description: Perfiles de personajes de Roshar
  - name: Heraldos
    description: Los Diez Heraldos de la Todopoderosa
  - name: Spren
    description: Spren de Roshar
  - name: Deshechos
    description: Los nueve Deshechos de Odium
  - name: Esquirlas
    description: Esquirlas de Adonalsium
  - name: Órdenes
    description: Las diez Órdenes de Caballeros Radiantes
  - name: Búsqueda
    description: Búsqueda avanzada con filtros, ordenación y paginación
  - name: Estadísticas
    description: Estadísticas agregadas de todas las entidades

paths:

  # ── Sistema ──────────────────────────────────────────────

  /health:
    get:
      tags: [Sistema]
      summary: Estado del servidor
      description: |
        Devuelve el estado de salud del servidor y el número de entidades cargadas en caché.
        Útil para monitores externos (Render, Fly.io, UptimeRobot).
        - `200 ok` — todo correcto
        - `503 degraded` — alguna entidad no se cargó al arrancar
      responses:
        "200":
          description: Servidor funcionando correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
              example:
                status: ok
                uptime_s: 3600
                entidades:
                  personajes: 244
                  heraldos: 10
                  spren: 42
                  deshechos: 9
                  esquirlas: 4
                total_entidades: 309
        "503":
          description: Servidor degradado — alguna entidad no se cargó
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  # ── Personajes ────────────────────────────────────────────

  /personajes:
    get:
      tags: [Personajes]
      summary: Listar todos los personajes
      description: Devuelve el índice resumido de todos los personajes disponibles.
      responses:
        "200":
          description: Lista de personajes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonajeResumen"

  /personajes/{id}:
    get:
      tags: [Personajes]
      summary: Perfil completo de un personaje
      parameters:
        - $ref: "#/components/parameters/PersonajeId"
      responses:
        "200":
          description: Perfil completo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonajeCompleto"
        "404":
          $ref: "#/components/responses/NotFound"

  /personajes/{id}/resumen:
    get:
      tags: [Personajes]
      summary: Resumen de un personaje
      description: Devuelve solo los campos del índice (id, nombre, orden, nivel_ideal, estado_actual, especie).
      parameters:
        - $ref: "#/components/parameters/PersonajeId"
      responses:
        "200":
          description: Resumen del personaje
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonajeResumen"
        "404":
          $ref: "#/components/responses/NotFound"

  /personajes/{id}/completo:
    get:
      tags: [Personajes]
      summary: Resumen + perfil fusionados
      description: Combina los campos del índice con el perfil completo en un solo objeto.
      parameters:
        - $ref: "#/components/parameters/PersonajeId"
      responses:
        "200":
          description: Datos completos fusionados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonajeCompleto"
        "404":
          $ref: "#/components/responses/NotFound"

  /personajes/{id}/relaciones:
    get:
      tags: [Personajes]
      summary: Todas las relaciones de un personaje
      parameters:
        - $ref: "#/components/parameters/PersonajeId"
      responses:
        "200":
          description: Relaciones del personaje
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelacionesRespuesta"
        "404":
          $ref: "#/components/responses/NotFound"

  /personajes/{id}/relaciones/{tipo}:
    get:
      tags: [Personajes]
      summary: Un tipo de relación de un personaje
      parameters:
        - $ref: "#/components/parameters/PersonajeId"
        - name: tipo
          in: path
          required: true
          schema:
            type: string
            enum: [familia, amigos, enemigos]
          example: amigos
      responses:
        "200":
          description: Relaciones del tipo indicado
        "400":
          description: Tipo de relación no válido
        "404":
          $ref: "#/components/responses/NotFound"

  /personajes/{id}/{seccion}:
    get:
      tags: [Personajes]
      summary: Sección concreta de un personaje
      parameters:
        - $ref: "#/components/parameters/PersonajeId"
        - name: seccion
          in: path
          required: true
          schema:
            type: string
            enum:
              - orden_radiantes
              - habilidades
              - relaciones
              - estado_mental
              - arco_narrativo
              - situacion_actual
              - apariciones
              - afiliaciones
              - identidades
          example: habilidades
      responses:
        "200":
          description: Sección solicitada
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Heraldos ─────────────────────────────────────────────

  /heraldos:
    get:
      tags: [Heraldos]
      summary: Listar los Diez Heraldos
      responses:
        "200":
          description: Lista de heraldos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeraldoResumen"

  /heraldos/{id}:
    get:
      tags: [Heraldos]
      summary: Perfil completo de un heraldo
      parameters:
        - $ref: "#/components/parameters/EntidadId"
      responses:
        "200":
          description: Perfil completo del heraldo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeraldoCompleto"
        "404":
          $ref: "#/components/responses/NotFound"

  /heraldos/{id}/resumen:
    get:
      tags: [Heraldos]
      summary: Resumen de un heraldo
      parameters:
        - $ref: "#/components/parameters/EntidadId"
      responses:
        "200":
          description: Campos resumidos del heraldo
        "404":
          $ref: "#/components/responses/NotFound"

  /heraldos/{id}/relaciones:
    get:
      tags: [Heraldos]
      summary: Relaciones de un heraldo
      parameters:
        - $ref: "#/components/parameters/EntidadId"
      responses:
        "200":
          description: Relaciones del heraldo
        "404":
          $ref: "#/components/responses/NotFound"

  /heraldos/{id}/{seccion}:
    get:
      tags: [Heraldos]
      summary: Sección concreta de un heraldo
      parameters:
        - $ref: "#/components/parameters/EntidadId"
        - name: seccion
          in: path
          required: true
          schema:
            type: string
            enum: [herald, apariencia, personalidad, habilidades, historia, apariciones, relaciones]
          example: habilidades
      responses:
        "200":
          description: Sección solicitada
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Spren ─────────────────────────────────────────────────

  /spren:
    get:
      tags: [Spren]
      summary: Listar todos los spren
      responses:
        "200":
          description: Lista de spren
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SprenResumen"

  /spren/{id}:
    get:
      tags: [Spren]
      summary: Perfil completo de un spren
      parameters:
        - $ref: "#/components/parameters/EntidadId"
      responses:
        "200":
          description: Perfil completo del spren
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SprenCompleto"
        "404":
          $ref: "#/components/responses/NotFound"

  /spren/{id}/resumen:
    get:
      tags: [Spren]
      summary: Resumen de un spren
      parameters:
        - $ref: "#/components/parameters/EntidadId"
      responses:
        "200":
          description: Campos resumidos del spren
        "404":
          $ref: "#/components/responses/NotFound"

  /spren/{id}/relaciones:
    get:
      tags: [Spren]
      summary: Relaciones de un spren
      parameters:
        - $ref: "#/components/parameters/EntidadId"
      responses:
        "200":
          description: Relaciones del spren
        "404":
          $ref: "#/components/responses/NotFound"

  /spren/{id}/{seccion}:
    get:
      tags: [Spren]
      summary: Sección concreta de un spren
      parameters:
        - $ref: "#/components/parameters/EntidadId"
        - name: seccion
          in: path
          required: true
          schema:
            type: string
            enum: [origen, apariencia, personalidad, habilidades, vinculo_nahel, historia, apariciones, relaciones]
          example: vinculo_nahel
      responses:
        "200":
          description: Sección solicitada
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Deshechos ─────────────────────────────────────────────

  /deshechos:
    get:
      tags: [Deshechos]
      summary: Listar los nueve Deshechos
      description: Devuelve el índice de los Deshechos de Odium.
      responses:
        "200":
          description: Lista de Deshechos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeshechoResumen"

  /deshechos/{id}:
    get:
      tags: [Deshechos]
      summary: Perfil completo de un Deshecho
      parameters:
        - $ref: "#/components/parameters/EntidadId"
      responses:
        "200":
          description: Perfil completo del Deshecho
        "404":
          $ref: "#/components/responses/NotFound"

  /deshechos/{id}/{seccion}:
    get:
      tags: [Deshechos]
      summary: Sección concreta de un Deshecho
      parameters:
        - $ref: "#/components/parameters/EntidadId"
        - name: seccion
          in: path
          required: true
          schema:
            type: string
          example: historia
      responses:
        "200":
          description: Sección solicitada
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Esquirlas ─────────────────────────────────────────────

  /esquirlas:
    get:
      tags: [Esquirlas]
      summary: Listar las Esquirlas
      description: Devuelve las Esquirlas presentes en el universo del Archivo de las Tormentas.
      responses:
        "200":
          description: Lista de Esquirlas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EsquirlaResumen"

  /esquirlas/{id}:
    get:
      tags: [Esquirlas]
      summary: Perfil completo de una Esquirla
      parameters:
        - $ref: "#/components/parameters/EntidadId"
      responses:
        "200":
          description: Perfil completo de la Esquirla
        "404":
          $ref: "#/components/responses/NotFound"

  /esquirlas/{id}/{seccion}:
    get:
      tags: [Esquirlas]
      summary: Sección concreta de una Esquirla
      parameters:
        - $ref: "#/components/parameters/EntidadId"
        - name: seccion
          in: path
          required: true
          schema:
            type: string
          example: historia
      responses:
        "200":
          description: Sección solicitada
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Órdenes ───────────────────────────────────────────────

  /ordenes:
    get:
      tags: [Órdenes]
      summary: Listar las diez Órdenes de Caballeros Radiantes
      responses:
        "200":
          description: Lista de órdenes con número de personajes
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_ordenes:
                    type: integer
                    example: 10
                  ordenes:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrdenResumen"

  /ordenes/{nombre}:
    get:
      tags: [Órdenes]
      summary: Detalle de una Orden
      description: Acepta nombre completo o slug (`corredores-del-viento`, `Corredores del Viento`).
      parameters:
        - $ref: "#/components/parameters/OrdenNombre"
      responses:
        "200":
          description: Detalle de la orden con lista de miembros
        "404":
          $ref: "#/components/responses/NotFound"

  /ordenes/{nombre}/personajes:
    get:
      tags: [Órdenes]
      summary: Personajes de una Orden
      description: Lista de todos los personajes pertenecientes a la orden indicada.
      parameters:
        - $ref: "#/components/parameters/OrdenNombre"
      responses:
        "200":
          description: Personajes de la orden
          content:
            application/json:
              schema:
                type: object
                properties:
                  orden:
                    type: string
                  total:
                    type: integer
                  personajes:
                    type: array
                    items:
                      type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /ordenes/{nombre}/spren:
    get:
      tags: [Órdenes]
      summary: Spren asociados a una Orden
      description: Lista de los spren vinculados a la orden indicada.
      parameters:
        - $ref: "#/components/parameters/OrdenNombre"
      responses:
        "200":
          description: Spren de la orden
          content:
            application/json:
              schema:
                type: object
                properties:
                  orden:
                    type: string
                  spren_tipico:
                    type: string
                    nullable: true
                  total:
                    type: integer
                  spren:
                    type: array
                    items:
                      type: object
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Búsqueda ──────────────────────────────────────────────

  /buscar:
    get:
      tags: [Búsqueda]
      summary: Búsqueda avanzada sobre todas las entidades
      description: |
        Permite buscar sobre personajes, heraldos, spren, Deshechos y Esquirlas
        con múltiples filtros combinables, ordenación y paginación.

        ### Filtros dinámicos (rutas profundas)
        Cualquier campo anidado es filtrable con notación de punto:
        ```
        GET /buscar?orden_radiantes.spren_asociado.principal=Sylphrena
        GET /buscar?habilidades.magia.potencias=Gravitación
        GET /buscar?situacion_actual.rol=sanador
        ```

        ### Operadores en nivel_ideal
        | Operador | Ejemplo |
        |---|---|
        | Igual | `?nivel_ideal=4` |
        | Mayor o igual | `?nivel_ideal=>=3` |
        | Menor o igual | `?nivel_ideal=<=2` |
        | Mayor que | `?nivel_ideal=>3` |
        | Menor que | `?nivel_ideal=<4` |

      parameters:
        - name: tipo
          in: query
          description: Tipo de entidad a buscar
          schema:
            type: string
            enum: [personaje, heraldo, spren, deshecho, esquirla]
          example: personaje

        - name: id
          in: query
          description: ID exacto de la entidad
          schema:
            type: string
          example: kaladin

        - name: especie
          in: query
          description: Especie del personaje
          schema:
            type: string
          example: humano

        - name: sexo
          in: query
          schema:
            type: string
            enum: [masculino, femenino]

        - name: nacionalidad
          in: query
          schema:
            type: string
          example: alezi

        - name: origen
          in: query
          schema:
            type: string
          example: Piedralar

        - name: estado_actual
          in: query
          schema:
            type: string
            enum: [vivo, viva, fallecido, fallecida, activo, activa, aprisionado]
          example: vivo

        - name: afiliacion
          in: query
          description: Afiliación exacta
          schema:
            type: string
          example: Puente Cuatro

        - name: orden
          in: query
          description: Orden de Caballeros Radiantes exacta
          schema:
            type: string
          example: Corredores del Viento

        - name: nivel_ideal
          in: query
          description: "Nivel del Ideal. Soporta operadores: >=, <=, >, <"
          schema:
            type: string
          example: ">=3"

        - name: libro
          in: query
          description: Título del libro en que aparece la entidad
          schema:
            type: string
          example: Juramentada

        - name: texto
          in: query
          description: Búsqueda libre en todo el contenido del perfil
          schema:
            type: string
          example: Shadesmar

        - name: sort
          in: query
          description: Campo de ordenación. Prefija con `-` para descendente. Admite notación de punto.
          schema:
            type: string
          example: "-nivel_ideal"

        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1

        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          example: 10

        - name: fields
          in: query
          description: Campos a devolver, separados por coma. Admite notación de punto.
          schema:
            type: string
          example: "nombre,orden_radiantes.orden,nivel_ideal"

      responses:
        "200":
          description: Resultados de la búsqueda
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BuscarResultados"
                  - $ref: "#/components/schemas/BuscarVacio"

  # ── Estadísticas ──────────────────────────────────────────

  /stats:
    get:
      tags: [Estadísticas]
      summary: Estadísticas generales de la API
      description: |
        Devuelve estadísticas agregadas sobre todas las entidades:
        totales por tipo, estado vital, orden radiante, especie, sexo, nacionalidad y libro.
      responses:
        "200":
          description: Estadísticas generales
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"
              example:
                resumen:
                  personajes: 244
                  heraldos: 10
                  spren: 42
                  deshechos: 9
                  esquirlas: 4
                  total: 309
                personajes:
                  total: 244
                  vivos: 132
                  fallecidos: 89
                  sin_estado: 23
                  caballeros_radiantes: 28
                  no_radiantes: 216
                  nivel_ideal_promedio: 2.7
                  por_orden:
                    Corredores del Viento: 12
                    Tejedores de Luz: 8
                  por_especie:
                    humano: 210
                    cantor: 28
                  por_sexo:
                    masculino: 140
                    femenino: 98
                deshechos:
                  total: 9
                  aprisionados: 6
                  activos: 3
                  sin_estado: 0
                esquirlas:
                  total: 4
                  activas: 2
                  fragmentadas: 1
                  absorbidas: 1

components:

  parameters:
    PersonajeId:
      name: id
      in: path
      required: true
      description: Identificador del personaje (en minúsculas)
      schema:
        type: string
      example: kaladin

    EntidadId:
      name: id
      in: path
      required: true
      description: Identificador de la entidad (en minúsculas)
      schema:
        type: string
      example: sylphrena

    OrdenNombre:
      name: nombre
      in: path
      required: true
      description: Nombre completo o slug de la orden
      schema:
        type: string
      example: corredores-del-viento

  responses:
    NotFound:
      description: Entidad o sección no encontrada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Personaje no encontrado"

  schemas:

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Entidad no encontrada"

    Health:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
          example: ok
        uptime_s:
          type: integer
          example: 3600
        entidades:
          type: object
          properties:
            personajes: { type: integer }
            heraldos:   { type: integer }
            spren:      { type: integer }
            deshechos:  { type: integer }
            esquirlas:  { type: integer }
        total_entidades:
          type: integer
          example: 309

    PersonajeResumen:
      type: object
      properties:
        id:           { type: string, example: kaladin }
        nombre:       { type: string, example: Kaladin }
        orden:        { type: string, nullable: true, example: Corredores del Viento }
        nivel_ideal:  { type: integer, nullable: true, example: 5 }
        estado_actual: { type: string, example: vivo }
        especie:      { type: string, example: humano }

    PersonajeCompleto:
      type: object
      properties:
        id:             { type: string, example: kaladin }
        nombre:         { type: string, example: Kaladin }
        nombre_completo: { type: string, example: "Kaladin hijo de Lirin" }
        apodos:         { type: array, items: { type: string } }
        sexo:           { type: string, example: masculino }
        especie:        { type: string, example: humano }
        nacionalidad:   { type: string, example: alezi }
        origen:         { type: string, example: Piedralar }
        planeta_natal:  { type: string, example: Roshar }
        estado_actual:  { type: string, example: vivo }
        apariciones:
          type: object
          properties:
            libros:
              type: array
              items:
                type: object
                properties:
                  titulo: { type: string }
                  rol:    { type: string }
                  pov:    { type: boolean }
        afiliaciones: { type: array, items: { type: string } }
        orden_radiantes:
          type: object
          properties:
            orden:        { type: string }
            nivel_ideal:  { type: integer, nullable: true }
            spren_asociado:
              type: object
              properties:
                principal: { type: string }
            estado_del_vinculo: { type: string }
        habilidades:
          type: object
          properties:
            magia:
              type: object
              properties:
                potencias:      { type: array, items: { type: string } }
